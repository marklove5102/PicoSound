[env:pico]
platform = raspberrypi
board = pico
framework = arduino

; Serial monitor
monitor_speed = 115200

; Libraries
lib_deps = 
    https://github.com/IWILZ/PicoSound.git#platformio-style
    ; Add PicoSem library URL here when available

; Build flags
build_flags = 
    -D PICO_BOARD=pico

; Upload settings
upload_protocol = picotool
